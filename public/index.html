<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabito Friends</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Fabito's Friends</h1>

        <div class="form-container">
            <h2 id="form-title">Add Friend</h2>
            <input type="hidden" id="friend-id">
            <input type="text" id="name" placeholder="Name">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="phone" placeholder="Phone">
            <input type="text" id="website" placeholder="Website">
            <button id="save-btn" onclick="saveFriend()">Save Friend</button>
            <button id="cancel-btn" style="display:none;" onclick="resetForm()">Cancel</button>
        </div>

        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search by name..." oninput="fetchFriends()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Website</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="friends-table-body">
                <!-- Friends will be loaded here -->
            </tbody>
        </table>
    </div>
    <script src="script.js"></script>
</body>
</html>
